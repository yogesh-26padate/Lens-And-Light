<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Lens & Light</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-black text-white">

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand logo" href="index.html">Lens & Light</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="blog.html">Portfolio</a></li>
                    <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="container contact-section" style="margin-top: 80px;">
        <div class="row align-items-center g-5">
            <div class="col-lg-5">
                <h5 class="text-gold text-uppercase letter-spacing-2">Get in Touch</h5>
                <h1 class="display-4 fw-bold mb-4">Let's Create <br>Something <span class="text-gold">Beautiful</span></h1>
                <p class="lead text-secondary mb-5">Whether it's a wedding, a portrait session, or an event, I'm ready to capture your moments.</p>
                
                <div class="d-flex align-items-center mb-4">
                    <div class="contact-icon-box"><i class="fas fa-phone"></i></div>
                    <div><h6 class="mb-0 text-white">Phone</h6><p class="text-secondary mb-0">+91 98765 43210</p></div>
                </div>
                
                <div class="d-flex align-items-center mb-4">
                    <div class="contact-icon-box"><i class="fas fa-envelope"></i></div>
                    <div><h6 class="mb-0 text-white">Email</h6><p class="text-secondary mb-0">hello@lensandlight.com</p></div>
                </div>

                <div class="d-flex align-items-center mb-4">
                    <div class="contact-icon-box"><i class="fas fa-map-marker-alt"></i></div>
                    <div><h6 class="mb-0 text-white">Studio</h6><p class="text-secondary mb-0">Mumbai, India</p></div>
                </div>
            </div>

            <div class="col-lg-7">
                <div class="contact-card p-5 shadow-lg">
                    <h3 class="fw-bold mb-4">Send a Message</h3>
                    <form id="contactForm">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="text-secondary small mb-1">Your Name</label>
                                <input type="text" id="name" class="form-control" placeholder="John Doe" required>
                            </div>
                            <div class="col-md-6">
                                <label class="text-secondary small mb-1">Your Email</label>
                                <input type="email" id="email" class="form-control" placeholder="john@example.com" required>
                            </div>
                            <div class="col-12">
                                <label class="text-secondary small mb-1">Tell me about your project</label>
                                <textarea id="message" class="form-control" rows="5" placeholder="I'm looking for a photographer for..." required></textarea>
                            </div>
                            <div class="col-12 mt-4">
                                <button type="submit" class="btn btn-gold w-100">Send Message</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
